name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore EmployeApp.sln

      - name: Build
        run: dotnet build EmployeApp.sln --no-restore -c Release

      - name: Test
        run: dotnet test EmployeApp.sln --no-build -c Release --verbosity normal
